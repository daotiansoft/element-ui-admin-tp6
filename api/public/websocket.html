<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Websocket</title>
</head>
<body>
<script>
    class SimpleWebSocket {
        constructor(url, options = {}) {
            this.url = url;
            this.onMessage = options.onMessage || (() => {});
            this.onOpen = options.onOpen || (() => {});
            this.onClose = options.onClose || (() => {});
            this.onError = options.onError || (() => {});

            this.ws = null;
            this.isConnected = false;

            this.connect();
        }

        // 建立连接
        connect() {
            this.ws = new WebSocket(this.url);

            this.ws.onopen = () => {
                this.isConnected = true;
                this.onOpen();
            };

            this.ws.onmessage = (event) => {
                let data = event.data;
                // 尝试解析 JSON
                try {
                    data = JSON.parse(data);
                } catch(e) {}
                this.onMessage(data);
            };

            this.ws.onclose = () => {
                this.isConnected = false;
                this.onClose();
            };

            this.ws.onerror = (error) => {
                this.onError(error);
            };
        }

        // 发送消息
        send(data) {
            if (!this.isConnected) {
                console.warn('WebSocket 未连接');
                return false;
            }

            const message = typeof data === 'object' ? JSON.stringify(data) : data;
            this.ws.send(message);
            return true;
        }

        // 关闭连接
        close() {
            if (this.ws) {
                this.ws.close();
                this.ws = null;
                this.isConnected = false;
            }
        }

        // 获取连接状态
        getStatus() {
            return this.isConnected;
        }
    }
</script>

<script>
    // 基本使用
    const ws = new SimpleWebSocket('ws://192.168.11.129:1000?user=2&name=test', {
        onOpen: () => {
            console.log('连接成功');
            ws.send('Hello Server!');

            // 发送 JSON 数据
            ws.send({
                type: 'chat',
                content: 'Hello',
                timestamp: Date.now()
            });
        },

        onMessage: (data) => {
            console.log('收到消息:', data);

            // 根据消息类型处理
            if (data.type === 'ping') {
                ws.send({
                    type: 'pong'
                });
            }
        },

        onClose: () => {
            console.log('连接已关闭');
        },

        onError: (error) => {
            console.error('连接错误:', error);
        }
    });

    // 外部发送消息
    function sendMessage(msg) {
        ws.send(msg);
    }

    // 检查连接状态
    function checkStatus() {
        console.log('连接状态:', ws.getStatus() ? '已连接' : '未连接');
    }

    // 手动关闭
    function disconnect() {
        ws.close();
    }
</script>

</body>
</html>
